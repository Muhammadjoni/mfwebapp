name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./cmd/api

      - name: go test
        run: go test ./... -race -timeout 60s

  frontend-user:
    name: Frontend User (TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-user

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-user/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:8080/api/v1

  frontend-admin:
    name: Frontend Admin (TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:8080/api/v1

  docker-build:
    name: Docker Build Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend-user, frontend-admin]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t mfwebapp-backend ./backend

      - name: Build frontend-user image
        run: docker build --build-arg VITE_API_URL=/api/v1 -t mfwebapp-frontend-user ./frontend-user

      - name: Build frontend-admin image
        run: docker build --build-arg VITE_API_URL=/api/v1 -t mfwebapp-frontend-admin ./frontend-admin
